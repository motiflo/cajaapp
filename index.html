<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CajaApp - Gestor de Caja Personal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .auth-screen {
            padding: 40px 20px;
            text-align: center;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .auth-form h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .auth-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .auth-form button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .auth-form button:hover {
            transform: translateY(-2px);
        }

        .auth-form button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-bottom: 15px;
            padding: 10px;
            background: #fadbd8;
            border-radius: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-weight: bold;
        }

        .loading.show {
            display: block;
        }

        .main-screen {
            display: none;
            padding: 0;
        }

        .top-bar {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            font-size: 14px;
            color: #666;
        }

        .logout-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .logout-btn:hover {
            background: #ff5252;
        }

        .dashboard {
            padding: 30px 20px;
            text-align: center;
        }

        .saldo-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .saldo-label {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .saldo-amount {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .saldo-info {
            font-size: 13px;
            opacity: 0.8;
        }

        .add-movimiento-section {
            margin-bottom: 30px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .historial-title {
            text-align: left;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .movimientos-lista {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .movimiento-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .movimiento-item:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .movimiento-info {
            text-align: left;
            flex: 1;
        }

        .movimiento-fecha {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .movimiento-concepto {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .movimiento-nota {
            font-size: 12px;
            color: #666;
        }

        .movimiento-monto {
            font-size: 18px;
            font-weight: bold;
            margin: 0 15px;
            min-width: 100px;
            text-align: right;
        }

        .movimiento-entrada {
            color: #2ecc71;
        }

        .movimiento-salida {
            color: #e74c3c;
        }

        .movimiento-acciones {
            display: flex;
            gap: 5px;
        }

        .btn-editar, .btn-eliminar {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn-editar {
            background: #3498db;
            color: white;
        }

        .btn-editar:hover {
            background: #2980b9;
        }

        .btn-eliminar {
            background: #e74c3c;
            color: white;
        }

        .btn-eliminar:hover {
            background: #c0392b;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 30px 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-guardar {
            background: #667eea;
            color: white;
        }

        .btn-cancelar {
            background: #e0e0e0;
            color: #333;
        }

        @media (max-width: 600px) {
            .saldo-amount {
                font-size: 36px;
            }

            .movimiento-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .movimiento-monto {
                margin: 10px 0 0 0;
                text-align: left;
            }

            .movimiento-acciones {
                width: 100%;
                margin-top: 10px;
            }

            .btn-editar, .btn-eliminar {
                flex: 1;
            }

            .auth-tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- PANTALLA AUTENTICACIÓN -->
        <div id="authScreen" class="auth-screen">
            <div class="header">
                <h1>💰 CajaApp</h1>
                <p>Gestor de Caja Personal</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Acceder</button>
                <button class="tab-btn" onclick="switchTab('registro')">Registro</button>
            </div>

            <!-- FORMULARIO LOGIN -->
            <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                <div class="error-message" id="loginError"></div>
                <div class="loading" id="loginLoading">Accediendo...</div>
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Contraseña" required>
                <button type="submit">Acceder</button>
            </form>

            <!-- FORMULARIO REGISTRO -->
            <form class="auth-form" id="registroForm" onsubmit="handleRegistro(event)">
                <div class="error-message" id="registroError"></div>
                <div class="loading" id="registroLoading">Creando cuenta...</div>
                <input type="email" id="registroEmail" placeholder="Email" required>
                <input type="password" id="registroPassword" placeholder="Contraseña (mín. 6 caracteres)" required>
                <input type="password" id="registroPassword2" placeholder="Confirmar contraseña" required>
                <button type="submit">Crear cuenta</button>
            </form>
        </div>

        <!-- PANTALLA PRINCIPAL -->
        <div id="mainScreen" class="main-screen">
            <div class="top-bar">
                <div class="user-info">
                    👤 <span id="userEmail"></span>
                </div>
                <button class="logout-btn" onclick="handleLogout()">Cerrar sesión</button>
            </div>

            <div class="dashboard">
                <!-- SALDO ACTUAL -->
                <div class="saldo-container">
                    <div class="saldo-label">Efectivo en Caja</div>
                    <div class="saldo-amount" id="saldoAmount">€0,00</div>
                    <div class="saldo-info">Total disponible</div>
                </div>

                <!-- FORMULARIO NUEVO MOVIMIENTO -->
                <div class="add-movimiento-section">
                    <button type="button" class="btn-primary" onclick="showAddModal()">
                        ➕ Nuevo Movimiento
                    </button>
                </div>

                <!-- HISTORIAL -->
                <div id="historialContainer">
                    <div class="historial-title">Últimos Movimientos</div>
                    <div id="movimientosList" class="movimientos-lista">
                        <div class="empty-state">No hay movimientos todavía</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL PARA AÑADIR/EDITAR -->
    <div id="modalMovimiento" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Nuevo Movimiento</h2>
            <form onsubmit="handleSaveMovimiento(event)">
                <input type="date" id="modalFecha" required>
                <input type="text" id="modalConcepto" placeholder="Concepto (ej: Depósito, Gasto)" required>
                <select id="modalTipo" required>
                    <option value="">-- Selecciona tipo --</option>
                    <option value="entrada">➕ Entrada</option>
                    <option value="salida">➖ Salida</option>
                </select>
                <input type="number" id="modalMonto" placeholder="Cantidad (€)" step="0.01" min="0" required>
                <textarea id="modalNota" placeholder="Nota (opcional)"></textarea>

                <div class="modal-buttons">
                    <button type="submit" class="btn-guardar">Guardar</button>
                    <button type="button" class="btn-cancelar" onclick="closeModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- FIREBASE SDK - VERSIÓN SIMPLE Y ESTABLE -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>

    <script>
        // ==================== CONFIGURACIÓN FIREBASE ====================
        // 👇 PEGA TU CÓDIGO DE FIREBASE AQUÍ 👇
        const firebaseConfig = {
          apiKey: "AIzaSyBto_T18FKrJUVC3dmzairhC8RdJA6VgPk",
          authDomain: "cajaapp-30821.firebaseapp.com",
          projectId: "cajaapp-30821",
          storageBucket: "cajaapp-30821.firebasestorage.app",
          messagingSenderId: "1083812484355",
          appId: "1:1083812484355:web:6815bd072e1702ae648536"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        console.log("✅ Firebase inicializado correctamente");
        
        // ==================== ESTADO ====================
        let usuarioActual = null;
        let movimientoEditando = null;

        // ==================== INICIALIZACIÓN ====================
        document.addEventListener('DOMContentLoaded', function() {
            // Observar cambios de autenticación
            auth.onAuthStateChanged((user) => {
                usuarioActual = user;
                mostrarPantalla();
                if (user) {
                    cargarMovimientos();
                }
            });

            // Establecer fecha actual en el modal
            const hoy = new Date().toISOString().split('T')[0];
            document.getElementById('modalFecha').value = hoy;
        });

        // ==================== CAMBIAR ENTRE TABS ====================
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registroForm = document.getElementById('registroForm');
            const buttons = document.querySelectorAll('.tab-btn');

            if (tab === 'login') {
                loginForm.classList.add('active');
                registroForm.classList.remove('active');
                buttons[0].classList.add('active');
                buttons[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registroForm.classList.add('active');
                buttons[0].classList.remove('active');
                buttons[1].classList.add('active');
            }

            // Limpiar errores
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('registroError').classList.remove('show');
        }

        // ==================== LOGIN ====================
        function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const loginLoading = document.getElementById('loginLoading');
            const loginError = document.getElementById('loginError');
            const submitBtn = document.querySelector('#loginForm button');

            // Mostrar estado de carga
            loginLoading.classList.add('show');
            submitBtn.disabled = true;
            loginError.classList.remove('show');

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Login exitoso
                    console.log("✅ Login exitoso:", userCredential.user.email);
                    loginLoading.classList.remove('show');
                    submitBtn.disabled = false;
                    limpiarFormularios();
                })
                .catch((error) => {
                    // Error
                    console.error("❌ Error de login:", error.code);
                    loginLoading.classList.remove('show');
                    submitBtn.disabled = false;

                    let mensaje = 'Error desconocido';
                    if (error.code === 'auth/user-not-found') {
                        mensaje = 'El email no existe. ¿Quizás quieras crear una cuenta?';
                    } else if (error.code === 'auth/wrong-password') {
                        mensaje = 'Contraseña incorrecta';
                    } else if (error.code === 'auth/invalid-email') {
                        mensaje = 'Email inválido';
                    }

                    loginError.textContent = mensaje;
                    loginError.classList.add('show');
                });
        }

        // ==================== REGISTRO ====================
        function handleRegistro(event) {
            event.preventDefault();

            const email = document.getElementById('registroEmail').value;
            const password = document.getElementById('registroPassword').value;
            const password2 = document.getElementById('registroPassword2').value;

            const registroLoading = document.getElementById('registroLoading');
            const registroError = document.getElementById('registroError');
            const submitBtn = document.querySelector('#registroForm button');

            // Validar contraseñas
            if (password !== password2) {
                registroError.textContent = 'Las contraseñas no coinciden';
                registroError.classList.add('show');
                return;
            }

            if (password.length < 6) {
                registroError.textContent = 'La contraseña debe tener mínimo 6 caracteres';
                registroError.classList.add('show');
                return;
            }

            // Mostrar estado de carga
            registroLoading.classList.add('show');
            submitBtn.disabled = true;
            registroError.classList.remove('show');

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Cuenta creada
                    console.log("✅ Cuenta creada:", userCredential.user.email);
                    registroLoading.classList.remove('show');
                    submitBtn.disabled = false;
                    limpiarFormularios();
                    switchTab('login');
                    alert('¡Cuenta creada! Ahora puedes acceder con tus credenciales.');
                })
                .catch((error) => {
                    // Error
                    console.error("❌ Error de registro:", error.code);
                    registroLoading.classList.remove('show');
                    submitBtn.disabled = false;

                    let mensaje = 'Error desconocido';
                    if (error.code === 'auth/email-already-in-use') {
                        mensaje = 'Este email ya está registrado';
                    } else if (error.code === 'auth/invalid-email') {
                        mensaje = 'Email inválido';
                    } else if (error.code === 'auth/weak-password') {
                        mensaje = 'Contraseña demasiado débil';
                    }

                    registroError.textContent = mensaje;
                    registroError.classList.add('show');
                });
        }

        // ==================== LOGOUT ====================
        function handleLogout() {
            auth.signOut().then(() => {
                usuarioActual = null;
                movimientoEditando = null;
                limpiarFormularios();
                mostrarPantalla();
                console.log("✅ Sesión cerrada");
            });
        }

        // ==================== MOSTRAR PANTALLAS ====================
        function mostrarPantalla() {
            const authScreen = document.getElementById('authScreen');
            const mainScreen = document.getElementById('mainScreen');

            if (usuarioActual) {
                authScreen.style.display = 'none';
                mainScreen.style.display = 'block';
                document.getElementById('userEmail').textContent = usuarioActual.email;
            } else {
                authScreen.style.display = 'block';
                mainScreen.style.display = 'none';
            }
        }

        // ==================== MOVIMIENTOS - FIRESTORE ====================
        function cargarMovimientos() {
            if (!usuarioActual) return;

            db.collection('usuarios').doc(usuarioActual.uid)
                .collection('movimientos')
                .orderBy('fecha', 'desc')
                .onSnapshot((snapshot) => {
                    actualizarDashboard(snapshot);
                }, (error) => {
                    console.error("Error al cargar movimientos:", error);
                });
        }

        function actualizarDashboard(snapshot) {
            const movimientos = [];
            snapshot.forEach((doc) => {
                movimientos.push({ id: doc.id, ...doc.data() });
            });

            // Calcular saldo
            const saldo = movimientos.reduce((total, mov) => {
                return mov.tipo === 'entrada' ? total + mov.monto : total - mov.monto;
            }, 0);

            document.getElementById('saldoAmount').textContent = `€${saldo.toFixed(2).replace('.', ',')}`;

            // Renderizar movimientos
            renderizarMovimientos(movimientos);
        }

        function renderizarMovimientos(movimientos) {
            const lista = document.getElementById('movimientosList');

            if (movimientos.length === 0) {
                lista.innerHTML = '<div class="empty-state">No hay movimientos todavía</div>';
                return;
            }

            lista.innerHTML = movimientos.map((mov) => `
                <div class="movimiento-item">
                    <div class="movimiento-info">
                        <div class="movimiento-fecha">${formatearFecha(mov.fecha)}</div>
                        <div class="movimiento-concepto">${mov.concepto}</div>
                        ${mov.nota ? `<div class="movimiento-nota">${mov.nota}</div>` : ''}
                    </div>
                    <div class="movimiento-monto ${mov.tipo === 'entrada' ? 'movimiento-entrada' : 'movimiento-salida'}">
                        ${mov.tipo === 'entrada' ? '+' : '-'}€${mov.monto.toFixed(2).replace('.', ',')}
                    </div>
                    <div class="movimiento-acciones">
                        <button class="btn-editar" onclick="editarMovimiento('${mov.id}', ${JSON.stringify(mov).replace(/'/g, "&apos;")})">✏️</button>
                        <button class="btn-eliminar" onclick="eliminarMovimiento('${mov.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // ==================== MODAL ====================
        function showAddModal() {
            movimientoEditando = null;
            document.getElementById('modalTitle').textContent = 'Nuevo Movimiento';
            document.getElementById('modalFecha').value = new Date().toISOString().split('T')[0];
            document.getElementById('modalConcepto').value = '';
            document.getElementById('modalTipo').value = '';
            document.getElementById('modalMonto').value = '';
            document.getElementById('modalNota').value = '';
            document.getElementById('modalMovimiento').classList.add('active');
        }

        function editarMovimiento(id, movimiento) {
            movimientoEditando = id;
            document.getElementById('modalTitle').textContent = 'Editar Movimiento';
            document.getElementById('modalFecha').value = movimiento.fecha;
            document.getElementById('modalConcepto').value = movimiento.concepto;
            document.getElementById('modalTipo').value = movimiento.tipo;
            document.getElementById('modalMonto').value = movimiento.monto;
            document.getElementById('modalNota').value = movimiento.nota || '';
            document.getElementById('modalMovimiento').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalMovimiento').classList.remove('active');
            movimientoEditando = null;
        }

        function handleSaveMovimiento(event) {
            event.preventDefault();

            if (!usuarioActual) return;

            const fecha = document.getElementById('modalFecha').value;
            const concepto = document.getElementById('modalConcepto').value;
            const tipo = document.getElementById('modalTipo').value;
            const monto = parseFloat(document.getElementById('modalMonto').value);
            const nota = document.getElementById('modalNota').value;

            if (!fecha || !concepto || !tipo || !monto) {
                alert('Por favor rellena todos los campos obligatorios');
                return;
            }

            const movimiento = {
                fecha: fecha,
                concepto: concepto,
                tipo: tipo,
                monto: monto,
                nota: nota,
                createdAt: new Date()
            };

            const usuarioRef = db.collection('usuarios').doc(usuarioActual.uid);

            if (movimientoEditando) {
                // Actualizar
                usuarioRef.collection('movimientos').doc(movimientoEditando).update(movimiento)
                    .then(() => {
                        console.log("✅ Movimiento actualizado");
                        closeModal();
                    })
                    .catch((error) => {
                        alert('Error al actualizar: ' + error.message);
                    });
            } else {
                // Crear nuevo
                usuarioRef.collection('movimientos').add(movimiento)
                    .then(() => {
                        console.log("✅ Movimiento creado");
                        closeModal();
                    })
                    .catch((error) => {
                        alert('Error al guardar: ' + error.message);
                    });
            }
        }

        function eliminarMovimiento(id) {
            if (confirm('¿Estás seguro de que quieres eliminar este movimiento?')) {
                db.collection('usuarios').doc(usuarioActual.uid)
                    .collection('movimientos').doc(id).delete()
                    .then(() => {
                        console.log("✅ Movimiento eliminado");
                    })                    
                    .catch((error) => {
                        alert('Error al eliminar: ' + error.message);
                    });
            }
        }

        // ==================== UTILIDADES ====================
        function formatearFecha(fecha) {
            const date = new Date(fecha + 'T00:00:00');
            const hoy = new Date();
            const ayer = new Date(hoy);
            ayer.setDate(ayer.getDate() - 1);

            const esHoy = date.toDateString() === hoy.toDateString();
            const esAyer = date.toDateString() === ayer.toDateString();

            if (esHoy) return 'Hoy';
            if (esAyer) return 'Ayer';

            return date.toLocaleDateString('es-ES', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        function limpiarFormularios() {
            document.getElementById('loginForm').reset();
            document.getElementById('registroForm').reset();
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('registroError').classList.remove('show');
        }
    </script>
